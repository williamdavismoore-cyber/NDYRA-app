<!doctype html><html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inbox</title>
  <link rel="icon" href="/assets/branding/favicon.ico">
  <link rel="stylesheet" href="/assets/css/styles.css?v=2026-03-16_122">
  <link rel="stylesheet" href="/assets/css/ndyra.css?v=2026-03-16_122">
</head>
<body class="ndyra-bg" data-page="ndyra-inbox"><a class="skip-link" href="#main-content">Skip to content</a>
<header class="header"><div class="brand"><strong>NDYRA</strong></div><nav class="nav" aria-label="Primary navigation"><a href="/workouts/">Workouts</a><a class="primary" href="/app/">App</a><a href="/biz/">Business</a><a href="/admin/">Admin</a></nav></header>
<main id="main-content" class="page container">
  <div class="ndyra-pagehead">
    <div>
      <h1>Inbox</h1>
      <div class="small" data-inbox-mode>Loading…</div>
    </div>
  </div>

  <div class="ndyra-card ndyra-mt-3" style="padding:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
    <button class="btn primary" type="button" data-inbox-tab="direct">Direct <span class="ndyra-pill" data-inbox-count-direct>0</span></button>
    <button class="btn" type="button" data-inbox-tab="requests">Requests <span class="ndyra-pill" data-inbox-count-requests>0</span></button>
    <button class="btn" type="button" data-inbox-tab="announcements">Announcements</button>
  </div>

  <div class="ndyra-card ndyra-mt-3" style="padding:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
    <input class="ndyra-input" data-inbox-search placeholder="Search conversations or announcements…" style="min-width:240px;flex:1;">
    <label class="small" style="display:flex;gap:8px;align-items:center;"><input type="checkbox" data-inbox-unread-only> Unread only</label>
  </div>

  <div class="ndyra-grid ndyra-mt-3" style="grid-template-columns:minmax(280px, 360px) minmax(0, 1fr);gap:14px;align-items:start;">
    <div class="ndyra-stack" data-inbox-list></div>
    <div data-inbox-detail></div>
  </div>
</main>
<div class="footer">NDYRA build preview (<span data-build-label>CP122</span>)</div>
<script src="/assets/js/site.js?v=2026-03-16_122"></script>
<script type="module" src="/assets/js/ndyra/boot.mjs?v=2026-03-16_122"></script>
</body>
</html>
